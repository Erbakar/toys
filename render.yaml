services:
  - type: web
    name: object-detector-api
    runtime: docker
    rootDir: object-detector-api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MODEL_PATH
        value: yolo11n.pt
      - key: CONFIDENCE_THRESHOLD
        value: "0.25"
      - key: IOU_THRESHOLD
        value: "0.45"
      - key: MAX_DETECTIONS
        value: "100"
      - key: INFERENCE_IMG_SIZE
        value: "640"
      - key: PORT
        value: "8000"
      - key: CORS_ORIGINS
        value: "*"
      - key: ENABLE_OPENAI_VISION
        value: "true"
      - key: OPENAI_VISION_MODEL
        value: gpt-4.1-mini
